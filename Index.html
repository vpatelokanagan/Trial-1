<!DOCTYPE html>
<html>
<head>
<title>Solar Production</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

.power{
font-size:70px;
margin-top:40px;
}
</style>

</head>

<body>

<h1>Solar Production</h1>

<div class="power" id="power">Loading...</div>

<script>

const SITE_ID = "2214110";
const USER_ID = "4e5451354d544d774d673d3d0a";

const url = `https://api.enphaseenergy.com/api/v4/systems/${SITE_ID}/summary?user_id=${USER_ID}`;

function loadData(){
fetch(url)
.then(r => r.json())
.then(data => {
document.getElementById("power").innerHTML =
data.current_power + " W";
});
}

loadData();

setInterval(loadData,60000);

</script>

</body>
</html>
