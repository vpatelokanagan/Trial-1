<!DOCTYPE html>
<html>
<head>
<title>Solar Production</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#0a0a0a;
color:white;
}

.power{
font-size:70px;
margin-top:40px;
}

.small{
font-size:20px;
opacity:0.7;
}
</style>

</head>

<body>

<h1>Solar Energy Production</h1>

<div class="power" id="power">Loading...</div>
<div class="small">Current Power</div>

<script>

const SITE_ID = "YOUR_SITE_ID";
const USER_ID = "YOUR_USER_ID";

const url = `https://api.enphaseenergy.com/api/v4/systems/${SITE_ID}/summary?user_id=${USER_ID}`;

function loadData(){

fetch(url)
.then(r => r.json())
.then(data => {

document.getElementById("power").innerHTML =
data.current_power + " W";

});

}

loadData();

setInterval(loadData,60000); // refresh every minute

</script>

</body>
</html>
